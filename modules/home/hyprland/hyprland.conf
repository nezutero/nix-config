monitor=eDP-1,1920x1080@60,0x0,1.25

exec-once = waybar & hyprpaper & hypridle & protonmail-bridge --cli
exec-once = --no-startup-id dunst -config ~/.config/dunst/dunstrc
exec-once = clipmenud &
exec-once = ~/dotfiles/scripts/battery_notify.sh &
exec-once = hyprsunset -t 4000
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME,qt5ct
env = XCURSOR_THEME, Adwaita
env = XCURSOR_SIZE, 24

$terminal = kitty
$fileManager = yazi
$menu = rofi -show drun
$editor = nvim
$browser = zen-beta
$player = kitty --title rmpc -e sh -c 'rmpc update && rmpc'

xwayland {
  force_zero_scaling = true
}

input {
    kb_layout = us,ca
    kb_variant =
    kb_model =
    kb_options = caps:escape, grp:alt_space_toggle
    kb_rules =
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    gesture = 3, horizontal, workspace

    sensitivity = -0.1 # -1.0 - 1.0, 0 - no modification
}

general {
    # https://wiki.hyprland.org/Configuring/Variables/

    gaps_in = 0 # 10
    gaps_out = 0 # 4
    border_size = 0 # 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # see https://wiki.hyprland.org/Configuring/Variables/ for more

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes

    # some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 4, default
    animation = borderangle, 1, 3, default
    animation = fade, 1, 3, default
    animation = workspaces, 0, 0, default
}

ecosystem {
    no_update_news = true
}

misc {
    # see https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# example per-device config
# see https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device {
    name = epic-mouse-v1
    sensitivity = 0.2
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrulev2 = nomaximizerequest, class:.*

# see https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, F, exec, $browser
bind = $mainMod, W, killactive, 
# bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, $terminal -e $fileManager
# ~//bin/zathura_rofi.sh
# bind = $mainMod, V, togglefloating, 
bind = $mainMod, B, exec, rofi-bluetooth
bind = $mainMod, H, exec, "$HOME/dotfiles/scripts/youtube-mpv.sh"
bind = $mainMod, R, exec, "$HOME/dotfiles/scripts/zathura_rofi.sh"
bind = $mainMod, N, exec, bash -c "kitty -d $HOME/notes"
bind = $mainMod, space, exec, $menu & sleep 0.2; hyprctl dispatch focuswindow "^(Rofi)"
# Password manager bindings
bind = $mainMod, P, exec, ~/dotfiles/scripts/rofipass.sh
bind = $mainMod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, A, exec, GDK_BACKEND=x11 audacity
# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, S, exec, $player
bind = $mainMod, D, exec, vesktop
bind = $mainMod, G, exec, signal-desktop

# window rules

# waybar
bind = $mainMod, M, exec, waybar
bind = $mainMod, K, exec, pkill waybar

# lock
bind = $mainMod, L, exec, hyprlock

# move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# switch to the previous workspace
bind = $mainMod, TAB, workspace, prev

# move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# scroll through existing workspaces with mainMod + scroll

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshot
# Copy to clipboard
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy -t image/png && \
    dunstify -a "Screenshot" -u low -r 9001 -t 1500 "Screenshot" "Copied to clipboard"

# Save to file
bind = $mainMod, Print, exec, \
    FILE=~/Pictures/screenshots/$(date +%Y-%m-%d-%H-%M-%S).png && \
    grim -g "$(slurp)" "$FILE" && \
    dunstify -a "Screenshot" -u low -r 9002 -t 1500 "Screenshot Saved" "$FILE"

binde = , XF86MonBrightnessUp, exec, ~/dotfiles/scripts/backlight.sh up
binde = , XF86MonBrightnessDown, exec, ~/dotfiles/scripts/backlight.sh down
binde = SUPER, XF86MonBrightnessUp, exec, ~/dotfiles/scripts/backlight.sh max
binde = SUPER, XF86MonBrightnessDown, exec, ~/dotfiles/scripts/backlight.sh min
binde = CTRL, XF86MonBrightnessUp, exec, ~/dotfiles/scripts/temperature.sh up
binde = CTRL, XF86MonBrightnessDown, exec, ~/dotfiles/scripts/temperature.sh down
bind =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
bind =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle 
bind =, XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bind =, XF86Favorites, exec, rofi -show power-menu -modi power-menu:~/dotfiles/scripts/rofi-power-menu.sh
bind = , XF86Tools, exec, kitty -d ~/dotfiles -e nvim .
